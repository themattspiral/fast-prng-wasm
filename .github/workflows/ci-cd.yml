name: CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v6

      - name: 🛠️ Set up Node.js for build
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Install dependencies (CI)
        run: npm ci

      - name: 📝 Check docs are up to date
        run: |
          npm run docs
          git diff --exit-code --name-only
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build project
        run: npm run build

      - name: ⬆️ Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: |
            dist/
            package.json
            README.md
            LICENSE.md
          retention-days: 7

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22', '24']
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v6

      - name: 🛠️ Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Install dependencies (CI)
        run: npm ci

      - name: ⬇️ Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: .

      - name: 🧪 Run Tests with Coverage
        if: matrix.node-version == '22' || matrix.node-version == '24'
        run: npm test
        
      - name: 🧪 Run Tests without Coverage
        if: matrix.node-version == '18' || matrix.node-version == '20'
        run: npm test --collectCoverage false

      - name: 📊 Upload coverage to Codecov
        if: matrix.node-version == '24'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: true
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

  version_and_release:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write       # commit package.json, create tag & create release in GH
      issues: write         # let semantic-release close & link resolved issues in the release
      pull-requests: write  # let semantic-release update PRs that are part of the release
      id-token: write       # Trusted Publisher OIDC authentication for npm
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 

      - name: 🛠️ Set up Node.js for publishing
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: 📦 Install dependencies (CI)
        run: npm ci
      
      - name: ⬇️ Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: .
      
      - name: 🚀 Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/npm@^13.1.5
            @semantic-release/github@^12.0.8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 📦 Publish to npm
        if: steps.semantic.outputs.new_release_published == 'true'
        run: npm publish *.tgz --provenance --access public